name: Unzip Go Depanne Project

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unzip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip file
        run: |
          unzip -o application-go-dpanne-flutter.zip -d extracted

      - name: Commit extracted files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add extracted
          git commit -m "Unzipped Go Depanne project" || echo "No changes to commit"
          git push